name: Publish Extension

# Release process: bump "version" in package.json + CHANGELOG, commit, then tag and push:
#   git tag v0.1.2 && git push origin v0.1.2
# The tag (without leading v) must exactly match package.json version or this workflow fails.
# --skip-duplicate on publish: re-runs or split failures (VSCE ok, Open VSX not) do not fail the job.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Verify tag matches package.json version
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          TAG_VER="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VER" != "$TAG_VER" ]; then
            echo "::error::Mismatch: package.json version is ${PKG_VER} but tag is ${GITHUB_REF_NAME}. Bump version and use tag v${PKG_VER}, or fix package.json to match the tag."
            exit 1
          fi
          echo "Publishing version ${PKG_VER} (tag ${GITHUB_REF_NAME})"

      - name: Install dependencies
        run: npm ci

      - name: Generate icon
        run: npm run generate-icon

      - name: Compile TypeScript
        run: npm run compile

      - name: Package extension
        run: npx @vscode/vsce package --no-dependencies

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --no-dependencies --skip-duplicate
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX Registry
        run: npx ovsx publish *.vsix --skip-duplicate
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Upload .vsix as release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
